<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Body Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      -webkit-touch-callout: none; -webkit-user-select: none;
      user-select: none; touch-action: none;
    }
    #canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

    /* overlay */
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.90); z-index: 20;
      font-family: 'EB Garamond', Georgia, serif;
      color: #fff; text-align: center; padding: 2.5rem;
    }
    #overlay h1 { font-size: clamp(2.4rem,9vw,3.2rem); font-weight:400; letter-spacing:.04em; margin-bottom:.8rem; }
    #overlay p  { font-size: clamp(1rem,3.8vw,1.2rem); opacity:.60; max-width:300px; line-height:1.65; }
    #startBtn {
      margin-top: 2.5rem; padding: .9rem 3rem;
      background: #fff; color: #000; border: none; border-radius: 100px;
      font-family: 'EB Garamond', Georgia, serif; font-size: 1.2rem;
      letter-spacing: .04em; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }

    /* controls */
    #controls {
      position: fixed; bottom: max(env(safe-area-inset-bottom,0px),1rem);
      left: 0; right: 0; padding: 0 1.5rem 1.25rem;
      display: none; flex-direction: column; align-items: center; gap: .45rem; z-index: 10;
    }
    #controls label {
      color: rgba(255,255,255,.35); font-size: .68rem;
      font-family: ui-monospace,'SF Mono',monospace; letter-spacing: .1em; text-transform: uppercase;
    }
    #threshRange { width:160px; accent-color:rgba(255,255,255,.55); opacity:.55; cursor:pointer; }

    /* mic dot */
    #micDot {
      position: fixed; top: max(env(safe-area-inset-top,0px),1rem); left: 1rem;
      display: none; align-items: center; gap: .45rem; z-index: 10;
    }
    #micDot span {
      width:7px; height:7px; border-radius:50%;
      background:#ff4b4b; box-shadow:0 0 7px #ff4b4b;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #micDot label { color:rgba(255,255,255,.4); font-size:.68rem; font-family:ui-monospace,'SF Mono',monospace; letter-spacing:.08em; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* clear */
    #clearBtn {
      position: fixed; top: max(env(safe-area-inset-top,0px),.75rem); right: 1rem;
      padding: .4rem 1rem; background:rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.22); border-radius:100px;
      color:rgba(255,255,255,.6); font-size:.72rem;
      font-family:ui-monospace,'SF Mono',monospace; letter-spacing:.06em;
      cursor:pointer; display:none; z-index:10; -webkit-tap-highlight-color:transparent;
    }

    /* debug */
    #debug {
      position: fixed; bottom:0; left:0; right:0;
      background: rgba(0,0,0,.90); border-top: 1px solid rgba(255,255,255,.12);
      color: #cfc; font-family: ui-monospace,'SF Mono',monospace; font-size:11px;
      padding: 10px 14px 14px; z-index:30;
      display:none; flex-direction:column; gap:5px;
    }
    #debug .dtitle { color:rgba(255,255,255,.3); font-size:9px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:2px; }
    #debug .row { display:flex; gap:8px; align-items:baseline; }
    #debug .lbl { color:rgba(255,255,255,.35); min-width:58px; }
    #debug .val { color:#7fff7f; word-break:break-all; flex:1; }
    #debug .err { color:#ff8080; }
    #debug .btns { display:flex; gap:8px; margin-top:4px; flex-wrap:wrap; }
    #debug button {
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
      border-radius:4px; color:#fff; padding:4px 12px;
      font-size:11px; font-family:inherit; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overlay">
  <h1>Body Canvas</h1>
  <p>Stand in front of a light wall or window.<br>Speak — your words will fall.</p>
  <button id="startBtn">Tap to Begin</button>
</div>

<div id="controls">
  <label>brightness threshold</label>
  <input type="range" id="threshRange" min="40" max="240" value="160">
</div>

<div id="micDot"><span></span><label>listening</label></div>
<button id="clearBtn">clear</button>

<div id="debug">
  <div class="dtitle">debug</div>
  <div class="row"><span class="lbl">video</span><span class="val" id="dbgVideo">—</span></div>
  <div class="row"><span class="lbl">interim</span><span class="val" id="dbgInterim">—</span></div>
  <div class="row"><span class="lbl">final</span><span class="val" id="dbgFinal">—</span></div>
  <div class="row"><span class="lbl">status</span><span class="val" id="dbgStatus">waiting</span></div>
  <div class="row"><span class="lbl">words</span><span class="val" id="dbgWords">0</span></div>
  <div class="row" id="dbgErrRow" style="display:none">
    <span class="lbl">error</span><span class="err" id="dbgErr">—</span>
  </div>
  <div class="btns">
    <button id="dbgSpawn">spawn test words</button>
    <button id="dbgFlip">flip cam rotation</button>
    <button id="dbgHide">hide debug</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
'use strict';

/* ─── CONFIG ────────────────────────────────────────── */
const CFG = {
  gravity: 1.2, restitution: 0.22, friction: 0.60, frictionAir: 0.009,
  cameraAlpha: 0.40,
  fontFamily: '"EB Garamond", Georgia, serif',
  fontSize: 30, padH: 16, padV: 8,
  terrainStep: 8, terrainInterval: 4, terrainH: 14,
  threshold: 160, maxWords: 30, minWordLen: 0,
};
const PALETTE = ['#ffffff','#ffd6a5','#caffbf','#9bf6ff','#bdb2ff','#ffc6ff','#fdffb6'];
let palIdx = 0;

/* ─── DEBUG ─────────────────────────────────────────── */
const dbgPanel   = document.getElementById('debug');
const dbgVideo   = document.getElementById('dbgVideo');
const dbgInterim = document.getElementById('dbgInterim');
const dbgFinal   = document.getElementById('dbgFinal');
const dbgStatus  = document.getElementById('dbgStatus');
const dbgErrRow  = document.getElementById('dbgErrRow');
const dbgErr     = document.getElementById('dbgErr');
const dbgWords   = document.getElementById('dbgWords');
function dbgSet(el, val, isErr) {
  el.textContent = String(val).slice(0, 140);
  if (isErr) { dbgErrRow.style.display = 'flex'; dbgErr.textContent = val; }
}

/* ─── CANVAS ────────────────────────────────────────── */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();

/* ─── MATTER.JS ─────────────────────────────────────── */
const { Engine, Composite, Bodies, Body } = Matter;
const engine = Engine.create();
engine.gravity.x = 0; engine.gravity.y = CFG.gravity;
const world = engine.world;

let floor, wallL, wallR;
function buildBoundaries() {
  if (floor) Composite.remove(world, [floor, wallL, wallR]);
  floor = Bodies.rectangle(W/2,  H+50,   W*3, 80, { isStatic:true, label:'floor' });
  wallL = Bodies.rectangle(-35,  H/2,    70,  H*4,{ isStatic:true, label:'wall'  });
  wallR = Bodies.rectangle(W+35, H/2,    70,  H*4,{ isStatic:true, label:'wall'  });
  Composite.add(world, [floor, wallL, wallR]);
}
buildBoundaries();

/* ─── TERRAIN BODIES ────────────────────────────────── */
let terrainBodies = [], numCols = 0;
function initTerrain() {
  terrainBodies.forEach(b => Composite.remove(world, b));
  terrainBodies = [];
  numCols = Math.ceil(W / CFG.terrainStep) + 1;
  for (let i = 0; i < numCols; i++) {
    const b = Bodies.rectangle(
      i * CFG.terrainStep + CFG.terrainStep / 2, H + 9999,
      CFG.terrainStep + 2, CFG.terrainH,
      { isStatic:true, label:'terrain', restitution:0.06, friction:0.9, frictionStatic:1 }
    );
    terrainBodies.push(b);
    Composite.add(world, b);
  }
}
initTerrain();

/* ─── CAMERA ────────────────────────────────────────── */
let video   = null;
// aCanvas is sized W×H (display space) so its pixels align with display coords.
// This makes terrain scanning trivially correct — no coordinate mapping needed.
let aCanvas = null, aCtx = null;

// When the sensor gives landscape (vw>vh), we rotate 90° to fill portrait screen.
// rotDir: +1 = CW (Math.PI/2), -1 = CCW (-Math.PI/2). Toggleable via debug.
let rotDir = 1;

let videoFit = { needsRot:false, scale:1, drawW:0, drawH:0, dx:0, dy:0 };

function computeVideoFit() {
  if (!video || !video.videoWidth) return;
  const vw = video.videoWidth, vh = video.videoHeight;
  const needsRot = vw > vh;

  // Effective portrait dimensions after rotation
  const pw = needsRot ? vh : vw;
  const ph = needsRot ? vw : vh;

  // Cover-fit: fill the screen, crop excess
  const scale = Math.max(W / pw, H / ph);

  videoFit = { needsRot, scale, vw, vh,
    drawW: pw * scale, drawH: ph * scale,
    dx: (W - pw * scale) / 2, dy: (H - ph * scale) / 2,
  };
  dbgSet(dbgVideo, `${vw}×${vh} ${needsRot?'landscape→rotated':'portrait'} scale=${scale.toFixed(3)} draw=${Math.round(pw*scale)}×${Math.round(ph*scale)}`);
}

/* Draw video onto any ctx with the correct rotation, mirror, and cover-fit.
   alpha: if provided, sets globalAlpha before draw.                        */
function drawVideo(targetCtx, alpha) {
  if (!video || video.readyState < 2 || !videoFit.vw || videoFit.drawW <= 0) return;
  const { needsRot, scale, vw, vh, drawW, drawH, dx, dy } = videoFit;

  targetCtx.save();
  if (alpha !== undefined) targetCtx.globalAlpha = alpha;

  if (needsRot) {
    /* Landscape sensor → rotate 90° to fill portrait screen.
       Center the draw area, rotate, then mirror for selfie.
       cx, cy = center of the drawn image in display space.    */
    const cx = dx + drawW / 2;
    const cy = dy + drawH / 2;
    targetCtx.translate(cx, cy);
    targetCtx.rotate(rotDir * Math.PI / 2);
    targetCtx.scale(-1, 1);  // selfie mirror (applied in rotated space)
    /* After rotation the video's vw→screen-height, vh→screen-width.
       Scale is computed on rotated dims, so:
         vw*scale covers drawH (portrait height)
         vh*scale covers drawW (portrait width)               */
    targetCtx.drawImage(video, -vw * scale / 2, -vh * scale / 2, vw * scale, vh * scale);
  } else {
    /* Portrait sensor — straightforward mirror + cover-fit. */
    targetCtx.translate(W, 0);
    targetCtx.scale(-1, 1);
    targetCtx.drawImage(video, dx, dy, drawW, drawH);
  }

  targetCtx.restore();
}

async function startCamera() {
  video = document.createElement('video');
  video.playsInline = true; video.muted = true; video.autoplay = true;

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user' },
    audio: false,
  });
  video.srcObject = stream;
  await video.play();

  // Analysis canvas in DISPLAY space (W×H) — see drawVideo + updateTerrain
  aCanvas = document.createElement('canvas');
  aCanvas.width  = W;
  aCanvas.height = H;
  aCtx = aCanvas.getContext('2d', { willReadFrequently: true });

  computeVideoFit();
}

/* ─── TERRAIN UPDATE ────────────────────────────────── */
function updateTerrain() {
  if (!video || !aCtx || video.readyState < 2) return;

  // Draw video into aCanvas using the SAME transform as the display.
  // Because aCanvas is W×H, pixel (x,y) in aCanvas == display pixel (x,y).
  // No coordinate mapping needed for terrain placement.
  aCtx.clearRect(0, 0, W, H);
  drawVideo(aCtx); // full brightness (no alpha arg)

  const img = aCtx.getImageData(0, 0, W, H).data;
  const thr = CFG.threshold;

  for (let i = 0; i < numCols; i++) {
    const dispX = i * CFG.terrainStep + CFG.terrainStep / 2;

    // Scan this display column top-to-bottom
    let topY = -1;
    for (let vy = 0; vy < H; vy++) {
      const base = (vy * W + Math.round(dispX)) * 4;
      const luma = (img[base]*299 + img[base+1]*587 + img[base+2]*114) / 1000;
      if (luma < thr) { topY = vy; break; }
    }

    if (topY >= 0) {
      const ny = topY + CFG.terrainH / 2;
      Body.setPosition(terrainBodies[i], { x: dispX, y: ny });
      terrainBodies[i].positionPrev.x = dispX;
      terrainBodies[i].positionPrev.y = ny;
    } else {
      Body.setPosition(terrainBodies[i], { x: dispX, y: H + 9999 });
      terrainBodies[i].positionPrev.x = dispX;
      terrainBodies[i].positionPrev.y = H + 9999;
    }
  }
}

/* ─── WORDS ─────────────────────────────────────────── */
let words = [];
function fontStr() { return `${CFG.fontSize}px ${CFG.fontFamily}`; }
function measureWord(text) {
  ctx.save(); ctx.font = fontStr();
  const m = ctx.measureText(text);
  ctx.restore();
  return { w: m.width + CFG.padH * 2, h: CFG.fontSize + CFG.padV * 2 };
}
function spawnWord(text) {
  if (words.length >= CFG.maxWords) { const o = words.shift(); Composite.remove(world, o.body); }
  const { w, h } = measureWord(text);
  const x = w/2 + Math.random() * Math.max(0, W - w);
  const body = Bodies.rectangle(x, -(h+20), w, h, {
    restitution: CFG.restitution, friction: CFG.friction,
    frictionAir: CFG.frictionAir, label: 'word',
  });
  Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.12);
  Body.setVelocity(body, { x: 0, y: 8 });
  Composite.add(world, body);
  words.push({ body, text, w, h, color: PALETTE[palIdx++ % PALETTE.length] });
}

function drawPill(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,   x+w,y+r);
  cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h, x+w-r,y+h);
  cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,   x,y+h-r);
  cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,     x+r,y);
  cx.closePath();
}

/* ─── SPEECH ────────────────────────────────────────── */
let recognition = null, speechActive = false;
const micDot = document.getElementById('micDot');
function cleanWord(r) { return r.replace(/[^a-zA-Z'\u2019\-]/g,''); }

async function startSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { dbgSet(dbgStatus,'ERROR: no SpeechRecognition',true); return; }

  dbgSet(dbgStatus,'requesting mic…');
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio:true });
    s.getTracks().forEach(t => t.stop());
    dbgSet(dbgStatus,'mic granted, starting…');
  } catch(e) {
    dbgSet(dbgStatus,`mic denied: ${e.message}`,true);
    alert('Microphone denied.\nSettings → Safari → Microphone.');
    return;
  }

  recognition = new SR();
  recognition.continuous = true; recognition.interimResults = true;
  recognition.lang = 'en-US'; recognition.maxAlternatives = 1;

  let interimSpawned = new Set(), lastTip = '';

  recognition.onresult = e => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i], t = r[0].transcript;
      if (r.isFinal) {
        dbgSet(dbgFinal, t);
        t.trim().split(/\s+/).map(cleanWord).filter(w=>w.length>CFG.minWordLen).forEach(w=>{
          if (!interimSpawned.has(w.toLowerCase())) spawnWord(w);
        });
        interimSpawned.clear(); lastTip = '';
      } else {
        dbgSet(dbgInterim, t);
        const tip = cleanWord(t.trim().split(/\s+/).pop());
        if (tip.length > CFG.minWordLen && tip.toLowerCase() !== lastTip.toLowerCase()) {
          spawnWord(tip); interimSpawned.add(tip.toLowerCase()); lastTip = tip;
        }
      }
    }
  };

  recognition.onerror = e => {
    dbgSet(dbgStatus,`error: ${e.error}`, e.error==='not-allowed');
    if (e.error==='not-allowed') alert('Microphone denied.\nSettings → Safari → Microphone.');
  };
  recognition.onstart = () => { micDot.style.display='flex'; dbgSet(dbgStatus,'active ✓'); };
  recognition.onend   = () => {
    if (speechActive) { dbgSet(dbgStatus,'restarting…'); setTimeout(()=>{ if(speechActive) recognition.start(); },300); }
    else { micDot.style.display='none'; dbgSet(dbgStatus,'stopped'); }
  };

  speechActive = true;
  recognition.start();
}

/* ─── DEVICE ORIENTATION ────────────────────────────── */
function setupTilt() {
  function onOri(e) {
    if (e.gamma==null) return;
    engine.gravity.x = Math.max(-2, Math.min(2, e.gamma/40));
  }
  if (typeof DeviceOrientationEvent!=='undefined' &&
      typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission()
      .then(s=>{ if(s==='granted') window.addEventListener('deviceorientation',onOri); })
      .catch(()=>{});
  } else {
    window.addEventListener('deviceorientation', onOri);
  }
}

/* ─── RENDER LOOP ───────────────────────────────────── */
let frame = 0;
(function loop() {
  requestAnimationFrame(loop);
  Engine.update(engine, 1000/60);
  if (++frame % CFG.terrainInterval === 0) { try { updateTerrain(); } catch(e) {} }

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Camera — drawVideo handles rotation + mirror internally
  try { drawVideo(ctx, CFG.cameraAlpha); } catch(e) {}

  // EXPLICITLY reset transform to identity before drawing words.
  // This guards against any transform leakage from the camera draw.
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;

  // Words
  ctx.font = fontStr();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  words = words.filter(({ body, text, w, h, color }) => {
    if (body.position.y - h/2 > H + 60) { Composite.remove(world, body); return false; }
    const { x, y } = body.position;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(body.angle);
    ctx.fillStyle = 'rgba(8,8,8,0.72)';
    drawPill(ctx, -w/2, -h/2, w, h, h/2);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(text, 0, 0);
    ctx.restore();
    return true;
  });
  if (dbgWords) dbgWords.textContent = words.length;
})();

/* ─── RESIZE ────────────────────────────────────────── */
window.addEventListener('resize', () => {
  resize();
  buildBoundaries();
  initTerrain();
  computeVideoFit();
  if (aCanvas) { aCanvas.width = W; aCanvas.height = H; }
});

/* ─── START ─────────────────────────────────────────── */
const overlay     = document.getElementById('overlay');
const startBtn    = document.getElementById('startBtn');
const controls    = document.getElementById('controls');
const threshRange = document.getElementById('threshRange');
const clearBtn    = document.getElementById('clearBtn');

startBtn.addEventListener('click', async () => {
  overlay.style.display   = 'none';
  dbgPanel.style.display  = 'flex';
  controls.style.display  = 'flex';
  clearBtn.style.display  = 'block';

  const speechP = startSpeech();   // start early, stays within gesture context

  try { await startCamera(); }
  catch(e) { dbgSet(dbgStatus, `cam fail: ${e.message}`, true); }

  await speechP;
  setupTilt();
});

threshRange.addEventListener('input', () => { CFG.threshold = +threshRange.value; });
clearBtn.addEventListener('click', () => { words.forEach(({body})=>Composite.remove(world,body)); words=[]; });

document.getElementById('dbgSpawn').addEventListener('click', () => {
  spawnWord('hello'); spawnWord('world'); dbgSet(dbgStatus,'spawned test words');
});
document.getElementById('dbgFlip').addEventListener('click', () => {
  rotDir *= -1;
  computeVideoFit();  // recompute fit label
  dbgSet(dbgStatus, `cam rotation flipped → ${rotDir===1?'CW':'CCW'}`);
});
document.getElementById('dbgHide').addEventListener('click', () => { dbgPanel.style.display='none'; });
</script>
</body>
</html>
